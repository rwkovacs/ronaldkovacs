<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .hero {
      text-align: center;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    p {
      margin-top: 1rem;
      font-size: 1.125rem;
      color: #9999bb;
      max-width: 40ch;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 640px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: #a78bfa;
      transform: translateY(-3px);
    }

    .card .icon { font-size: 2rem; }
    .card h2 { margin-top: 0.5rem; font-size: 1rem; color: #c8c8e8; }
    .card p { margin-top: 0.25rem; font-size: 0.85rem; color: #7777aa; }

    footer {
      color: #555577;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Hello, World!</h1>
    <p>A simple starting point for something great.</p>
  </div>

  <div class="card-grid">
    <div class="card">
      <div class="icon">🚀</div>
      <h2>Fast</h2>
      <p>Built with plain HTML & CSS — zero dependencies.</p>
    </div>
    <div class="card">
      <div class="icon">🎨</div>
      <h2>Beautiful</h2>
      <p>Clean, modern design that works on any screen.</p>
    </div>
    <div class="card">
      <div class="icon">🔧</div>
      <h2>Customizable</h2>
      <p>Easy to extend and make your own.</p>
    </div>
  </div>

  <footer>hello-world &copy; 2026</footer>
</body>
</html>
